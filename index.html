<html>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body-equiv{display:flex}
#wrap{display:flex;width:100%;height:100vh;min-height:600px;background:#000;font-family:'Courier New',monospace}
#cv{display:block;flex:1;background:#000}
#panel{width:290px;flex-shrink:0;background:rgba(10,15,20,0.97);color:#00ff88;padding:12px;overflow-y:auto;border-left:1px solid #00ff44;font-size:11px}
.pg{margin-bottom:14px;border:1px solid #003322;padding:10px;border-radius:4px}
.pg h3{margin:0 0 8px;color:#00ffaa;font-size:11px;text-transform:uppercase;letter-spacing:1px}
.row{display:flex;align-items:center;margin-bottom:5px;gap:4px}
.row label{flex:0 0 90px;color:#88ffcc;font-size:10px}
.row input[type=range]{flex:1;height:3px;accent-color:#00ff88;cursor:pointer}
.val{min-width:36px;text-align:right;color:#00ff88;font-size:10px;font-weight:bold}
.btns{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px}
button{background:#003322;border:1px solid #00ff44;color:#00ffaa;padding:4px 8px;border-radius:3px;cursor:pointer;font-size:10px;font-family:'Courier New',monospace}
button:hover{background:#005533}
#stats{font-size:10px;color:#88ffcc;line-height:1.6;margin-top:8px;background:rgba(0,30,15,0.4);padding:6px;border-radius:3px}
.dz{border-color:#ff4444!important}
.dz h3{color:#ff6666!important}
</style>

<div id="wrap">
<canvas id="cv"></canvas>
<div id="panel">
<div style="text-align:center;margin-bottom:12px">
  <div style="color:#00ffaa;font-size:16px;font-weight:bold">GeneticBoids</div>
  <div style="color:#00cc77;font-size:10px">by @attentionmech</div>
</div>

<div class="pg">
<h3>Population</h3>
<div class="row"><label>Boid count</label><input type="range" id="sBoidCount" min="50" max="2000" value="800"><span class="val" id="vBoidCount">800</span></div>
<div class="btns"><button onclick="setBoidCount(100)">Minimal</button><button onclick="setBoidCount(800)">Medium</button><button onclick="setBoidCount(2000)">Max</button></div>
</div>

<div class="pg">
<h3>Movement</h3>
<div class="row"><label>Max speed</label><input type="range" id="sMaxSpeed" min="0.5" max="8" step="0.1" value="2.5"><span class="val" id="vMaxSpeed">2.5</span></div>
<div class="row"><label>Max force</label><input type="range" id="sMaxForce" min="0.01" max="0.5" step="0.01" value="0.1"><span class="val" id="vMaxForce">0.10</span></div>
</div>

<div class="pg">
<h3>Flocking</h3>
<div class="row"><label>Alignment</label><input type="range" id="sAlign" min="0" max="3" step="0.1" value="1.0"><span class="val" id="vAlign">1.0</span></div>
<div class="row"><label>Separation</label><input type="range" id="sSep" min="0" max="3" step="0.1" value="1.5"><span class="val" id="vSep">1.5</span></div>
<div class="row"><label>Cohesion</label><input type="range" id="sCoh" min="0" max="3" step="0.1" value="1.0"><span class="val" id="vCoh">1.0</span></div>
</div>

<div class="pg">
<h3>Perception</h3>
<div class="row"><label>Align range</label><input type="range" id="sAlignR" min="10" max="120" value="50"><span class="val" id="vAlignR">50</span></div>
<div class="row"><label>Sep range</label><input type="range" id="sSepR" min="5" max="60" value="22"><span class="val" id="vSepR">22</span></div>
<div class="row"><label>Coh range</label><input type="range" id="sCohR" min="10" max="120" value="50"><span class="val" id="vCohR">50</span></div>
</div>

<div class="pg">
<h3>Genetics</h3>
<div class="row"><label>Lifespan</label><input type="range" id="sLife" min="200" max="10000" step="100" value="4000"><span class="val" id="vLife">4000</span></div>
<div class="row"><label>Signal prob</label><input type="range" id="sSigP" min="0" max="0.01" step="0.0001" value="0.002"><span class="val" id="vSigP">0.0020</span></div>
<div class="row"><label>Signal range</label><input type="range" id="sSigR" min="10" max="200" value="60"><span class="val" id="vSigR">60</span></div>
<div class="row"><label>Signal force</label><input type="range" id="sSigF" min="0.01" max="0.5" step="0.01" value="0.1"><span class="val" id="vSigF">0.10</span></div>
</div>

<div class="pg">
<h3>Visual</h3>
<div class="row"><label>Boid size</label><input type="range" id="sBoidSz" min="0.5" max="5" step="0.1" value="1.2"><span class="val" id="vBoidSz">1.2</span></div>
<div class="row"><label>Signal alpha</label><input type="range" id="sSigA" min="0" max="255" step="1" value="120"><span class="val" id="vSigA">120</span></div>
<div class="row"><label>Trail fade</label><input type="range" id="sFade" min="0" max="30" step="1" value="0"><span class="val" id="vFade">0</span></div>
</div>

<div class="pg">
<h3>Presets</h3>
<div class="btns">
  <button onclick="preset('calm')">Calm</button>
  <button onclick="preset('chaotic')">Chaotic</button>
  <button onclick="preset('swarm')">Swarm</button>
  <button onclick="preset('signals')">Signals</button>
  <button onclick="preset('default')">Reset</button>
</div>
</div>

<div class="pg dz">
<h3>Danger zone</h3>
<div class="btns">
  <button onclick="doExplode()">Explode!</button>
  <button onclick="clearBoids()">Clear</button>
  <button onclick="randomizeAll()">Randomize</button>
</div>
</div>

<div id="stats">
FPS: <span id="sFPS">--</span><br>
Boids: <span id="sPop">--</span><br>
Signals: <span id="sSig">--</span><br>
Avg speed: <span id="sSpd">--</span>
</div>
</div>
</div>

<script>
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const panel = document.getElementById('panel');

const MAX = 2000;
const GLEN = 6;

let W, H;
function resize(){
  W = cv.width = window.innerWidth - 290;
  H = cv.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// --- Params ---
let P = {
  n: 800, maxSpeed: 2.5, maxForce: 0.1,
  alignW: 1.0, sepW: 1.5, cohW: 1.0,
  alignR: 50, sepR: 22, cohR: 50,
  life: 4000, sigP: 0.002, sigR: 60, sigF: 0.1,
  boidSz: 1.2, sigA: 120, fade: 0
};

// --- SOA boid arrays for cache efficiency ---
const px = new Float32Array(MAX);
const py = new Float32Array(MAX);
const vx = new Float32Array(MAX);
const vy = new Float32Array(MAX);
const ax = new Float32Array(MAX);
const ay = new Float32Array(MAX);
const age= new Int32Array(MAX);
const lifespan = new Int32Array(MAX);
const genome = new Array(MAX);
const colorCache = new Array(MAX);

let count = 0;

function rndGenome(){
  let s='';
  for(let i=0;i<GLEN;i++) s+=Math.random()<0.5?'0':'1';
  return s;
}

function genomeColor(g){
  const r = (parseInt(g.slice(0,2),2)*85+85)&255;
  const gv= (parseInt(g.slice(2,4),2)*85+85)&255;
  const b = (parseInt(g.slice(4,6),2)*85+85)&255;
  return `rgb(${r},${gv},${b})`;
}

function addBoid(x,y,g){
  if(count>=MAX) return;
  const i=count++;
  px[i]=x; py[i]=y;
  const spd=1+Math.random()*2;
  const ang=Math.random()*Math.PI*2;
  vx[i]=Math.cos(ang)*spd; vy[i]=Math.sin(ang)*spd;
  ax[i]=0; ay[i]=0;
  age[i]=Math.floor(Math.random()*P.life*0.3)|0;
  lifespan[i]=P.life+Math.floor(Math.random()*500);
  genome[i]=g||rndGenome();
  colorCache[i]=genomeColor(genome[i]);
}

function removeBoid(i){
  count--;
  px[i]=px[count]; py[i]=py[count];
  vx[i]=vx[count]; vy[i]=vy[count];
  ax[i]=ax[count]; ay[i]=ay[count];
  age[i]=age[count]; lifespan[i]=lifespan[count];
  genome[i]=genome[count]; colorCache[i]=colorCache[count];
}

function initFlock(){
  count=0;
  for(let i=0;i<P.n;i++) addBoid(Math.random()*W, Math.random()*H, null);
}

// --- Spatial grid ---
let grid = new Map();
let cellSz = 60;

function buildGrid(){
  grid.clear();
  cellSz = Math.max(P.alignR, P.cohR, P.sigR)+4;
  for(let i=0;i<count;i++){
    const cx=(px[i]/cellSz)|0, cy=(py[i]/cellSz)|0;
    const k=cx*10000+cy;
    let cell=grid.get(k);
    if(!cell){cell=[];grid.set(k,cell);}
    cell.push(i);
  }
}

function getNeighborCell(cx,cy,out){
  for(let dx=-1;dx<=1;dx++) for(let dy=-1;dy<=1;dy++){
    const k=(cx+dx)*10000+(cy+dy);
    const c=grid.get(k);
    if(c) for(let j=0;j<c.length;j++) out.push(c[j]);
  }
}

// reuse arrays to avoid GC
const nbuf = new Int32Array(MAX);

// --- Flocking ---
const sigLines = [];

function flockAll(){
  sigLines.length=0;
  const sigLim = 300;

  buildGrid();

  const newGenomes = [];
  const newX = [], newY = [];
  const toRemove = [];

  for(let i=0;i<count;i++){
    ax[i]=0; ay[i]=0;
  }

  for(let i=0;i<count;i++){
    const cxi=(px[i]/cellSz)|0, cyi=(py[i]/cellSz)|0;
    let nb=0;

    for(let dx=-1;dx<=1;dx++) for(let dy=-1;dy<=1;dy++){
      const k=(cxi+dx)*10000+(cyi+dy);
      const c=grid.get(k);
      if(c) for(let j=0;j<c.length;j++) nbuf[nb++]=c[j];
    }

    // align
    let alx=0,aly=0,alc=0;
    // sep
    let sex=0,sey=0,sec=0;
    // coh
    let cox=0,coy=0,coc=0;

    const aR2=P.alignR*P.alignR;
    const sR2=P.sepR*P.sepR;
    const cR2=P.cohR*P.cohR;
    const siR2=P.sigR*P.sigR;

    let repro = -1;

    for(let ni=0;ni<nb;ni++){
      const j=nbuf[ni];
      if(j===i) continue;
      const dx=px[j]-px[i], dy=py[j]-py[i];
      const d2=dx*dx+dy*dy;

      if(d2<aR2){ alx+=vx[j]; aly+=vy[j]; alc++; }
      if(d2<sR2&&d2>0){ const inv=1/Math.sqrt(d2); sex-=dx*inv; sey-=dy*inv; sec++; }
      if(d2<cR2){ cox+=px[j]; coy+=py[j]; coc++; }

      // reproduce
      if(repro<0 && d2<25*25 && Math.random()<0.0003){
        repro=j;
      }

      // signal
      if(d2<siR2 && Math.random()<P.sigP){
        const g1=genome[i], g2=genome[j];
        const start=Math.floor(Math.random()*Math.max(1,GLEN-3));
        const sub=g1.substring(start,start+3);
        let inv='';
        for(let k=0;k<sub.length;k++) inv+=sub[k]==='0'?'1':'0';
        if(g2.includes(inv)){
          const fmag=P.sigF;
          const dm=Math.sqrt(d2)||1;
          ax[j]+=(px[i]-px[j])/dm*fmag;
          ay[j]+=(py[i]-py[j])/dm*fmag;
          if(sigLines.length<sigLim) sigLines.push(px[i],py[i],px[j],py[j]);
        }
      }
    }

    const ms=P.maxSpeed, mf=P.maxForce;

    if(alc>0){
      let mx=alx/alc, my=aly/alc;
      const m=Math.sqrt(mx*mx+my*my)||1; mx=mx/m*ms-vx[i]; my=my/m*ms-vy[i];
      const fm=Math.sqrt(mx*mx+my*my); if(fm>mf){mx=mx/fm*mf;my=my/fm*mf;}
      ax[i]+=mx*P.alignW; ay[i]+=my*P.alignW;
    }
    if(sec>0){
      let mx=sex/sec,my=sey/sec;
      const m=Math.sqrt(mx*mx+my*my)||1; mx=mx/m*ms-vx[i]; my=my/m*ms-vy[i];
      const fm=Math.sqrt(mx*mx+my*my); if(fm>mf){mx=mx/fm*mf;my=my/fm*mf;}
      ax[i]+=mx*P.sepW; ay[i]+=my*P.sepW;
    }
    if(coc>0){
      let mx=cox/coc-px[i], my=coy/coc-py[i];
      const m=Math.sqrt(mx*mx+my*my)||1; mx=mx/m*ms-vx[i]; my=my/m*ms-vy[i];
      const fm=Math.sqrt(mx*mx+my*my); if(fm>mf){mx=mx/fm*mf;my=my/fm*mf;}
      ax[i]+=mx*P.cohW; ay[i]+=my*P.cohW;
    }

    // crossover
    if(repro>=0 && count+newX.length < MAX){
      const g1=genome[i], g2=genome[repro];
      const mid=1+Math.floor(Math.random()*(GLEN-2));
      let ng=g1.slice(0,mid)+g2.slice(mid);
      ng=ng.split('').map(b=>Math.random()<0.01?(b==='0'?'1':'0'):b).join('');
      newGenomes.push(ng); newX.push(px[i]); newY.push(py[i]);
    }
  }

  // integrate
  for(let i=0;i<count;i++){
    vx[i]+=ax[i]; vy[i]+=ay[i];
    const vm=Math.sqrt(vx[i]*vx[i]+vy[i]*vy[i]);
    if(vm>P.maxSpeed){const s=P.maxSpeed/vm; vx[i]*=s; vy[i]*=s;}
    px[i]=(px[i]+vx[i]+W)%W;
    py[i]=(py[i]+vy[i]+H)%H;
    age[i]++;
  }

  // remove dead (backwards)
  for(let i=count-1;i>=0;i--){
    if(age[i]>lifespan[i]) removeBoid(i);
  }

  // add offspring
  for(let k=0;k<newGenomes.length&&count<MAX;k++){
    addBoid(newX[k],newY[k],newGenomes[k]);
  }

  // clamp population
  while(count>P.n){
    // remove oldest
    let oldest=0;
    for(let i=1;i<count;i++) if(age[i]>age[oldest]) oldest=i;
    removeBoid(oldest);
  }
}

// --- Draw ---
function draw(){
  if(P.fade>0){
    ctx.fillStyle=`rgba(0,0,0,${P.fade/100})`;
    ctx.fillRect(0,0,W,H);
  } else {
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle='#000';
    ctx.fillRect(0,0,W,H);
  }

  const sz=P.boidSz;

  // group by color for batched draw
  const groups = new Map();
  for(let i=0;i<count;i++){
    const c=colorCache[i];
    let g=groups.get(c);
    if(!g){g={c,boids:[]};groups.set(c,g);}
    g.boids.push(i);
  }

  for(const [c,g] of groups){
    ctx.fillStyle=c;
    ctx.beginPath();
    for(const i of g.boids){
      const x=px[i],y=py[i];
      const vxn=vx[i],vyn=vy[i];
      const vm=Math.sqrt(vxn*vxn+vyn*vyn)||1;
      const cos=vxn/vm, sin=vyn/vm;
      // triangle: tip forward, base behind
      const tipx=x+cos*4*sz, tipy=y+sin*4*sz;
      const bx=x-cos*2.5*sz, by=y-sin*2.5*sz;
      const lx=bx-sin*2*sz,  ly=by+cos*2*sz;
      const rx=bx+sin*2*sz,  ry=by-cos*2*sz;
      ctx.moveTo(tipx,tipy);
      ctx.lineTo(lx,ly);
      ctx.lineTo(rx,ry);
      ctx.closePath();
    }
    ctx.fill();
  }

  // signal lines
  if(sigLines.length>0){
    const alpha=(P.sigA/255).toFixed(3);
    ctx.strokeStyle=`rgba(255,80,80,${alpha})`;
    ctx.lineWidth=0.5;
    ctx.beginPath();
    for(let k=0;k<sigLines.length;k+=4){
      ctx.moveTo(sigLines[k],sigLines[k+1]);
      ctx.lineTo(sigLines[k+2],sigLines[k+3]);
    }
    ctx.stroke();
  }
}

// --- Stats ---
let lastT=performance.now(), frames=0, fps=0;
function updateStats(){
  frames++;
  const now=performance.now();
  if(now-lastT>600){
    fps=Math.round(frames/((now-lastT)/1000));
    frames=0; lastT=now;
    document.getElementById('sFPS').textContent=fps;
    document.getElementById('sPop').textContent=count;
    document.getElementById('sSig').textContent=sigLines.length/4|0;
    let spd=0;
    for(let i=0;i<count;i++) spd+=Math.sqrt(vx[i]*vx[i]+vy[i]*vy[i]);
    document.getElementById('sSpd').textContent=(count>0?(spd/count).toFixed(2):'0');
  }
}

// --- Loop ---
function loop(){
  flockAll();
  draw();
  updateStats();
  requestAnimationFrame(loop);
}

// --- Controls ---
function bind(id,key,disp,decimals=1){
  const sl=document.getElementById('s'+id);
  const vl=document.getElementById('v'+id);
  sl.addEventListener('input',()=>{
    P[key]=parseFloat(sl.value);
    vl.textContent=P[key].toFixed(decimals);
    if(key==='n') setBoidCount(P.n);
  });
}

bind('BoidCount','n','BoidCount',0);
bind('MaxSpeed','maxSpeed','MaxSpeed',1);
bind('MaxForce','maxForce','MaxForce',2);
bind('Align','alignW','Align',1);
bind('Sep','sepW','Sep',1);
bind('Coh','cohW','Coh',1);
bind('AlignR','alignR','AlignR',0);
bind('SepR','sepR','SepR',0);
bind('CohR','cohR','CohR',0);
bind('Life','life','Life',0);
bind('SigP','sigP','SigP',4);
bind('SigR','sigR','SigR',0);
bind('SigF','sigF','SigF',2);
bind('BoidSz','boidSz','BoidSz',1);
bind('SigA','sigA','SigA',0);
bind('Fade','fade','Fade',0);

function setBoidCount(n){
  n=Math.min(n,MAX);
  P.n=n;
  document.getElementById('sBoidCount').value=n;
  document.getElementById('vBoidCount').textContent=n;
  while(count<n) addBoid(Math.random()*W, Math.random()*H, null);
}

function preset(name){
  const presets={
    default:{maxSpeed:2.5,maxForce:0.1,alignW:1,sepW:1.5,cohW:1,sigP:0.002,sigF:0.1,sigR:60,alignR:50,sepR:22,cohR:50},
    calm:   {maxSpeed:1.2,maxForce:0.05,alignW:1.8,sepW:1.2,cohW:1.5,sigP:0.0005,sigF:0.04,sigR:40},
    chaotic:{maxSpeed:5,maxForce:0.3,alignW:0.4,sepW:0.6,cohW:0.3,sigP:0.008,sigF:0.25,sigR:80},
    swarm:  {maxSpeed:3,maxForce:0.15,alignW:2.2,sepW:2.8,cohW:2,sigP:0.001,sigF:0.1,sigR:50},
    signals:{maxSpeed:2,maxForce:0.1,alignW:0.8,sepW:1,cohW:0.8,sigP:0.009,sigF:0.3,sigR:100},
  };
  const cfg=presets[name]||presets.default;
  Object.assign(P,cfg);
  // sync sliders
  const map={maxSpeed:'MaxSpeed',maxForce:'MaxForce',alignW:'Align',sepW:'Sep',cohW:'Coh',
             sigP:'SigP',sigF:'SigF',sigR:'SigR',alignR:'AlignR',sepR:'SepR',cohR:'CohR'};
  for(const [k,id] of Object.entries(map)){
    const sl=document.getElementById('s'+id);
    const vl=document.getElementById('v'+id);
    if(sl&&P[k]!==undefined){sl.value=P[k]; vl.textContent=parseFloat(P[k]).toFixed(sl.step&&sl.step.includes('.')?sl.step.split('.')[1].length:1);}
  }
}

function doExplode(){
  for(let i=0;i<count;i++){
    const spd=6+Math.random()*6;
    const ang=Math.random()*Math.PI*2;
    vx[i]=Math.cos(ang)*spd; vy[i]=Math.sin(ang)*spd;
  }
}

function clearBoids(){count=0;}

function randomizeAll(){
  P.maxSpeed=0.5+Math.random()*5;
  P.maxForce=0.01+Math.random()*0.3;
  P.alignW=Math.random()*2.5;
  P.sepW=Math.random()*3;
  P.cohW=Math.random()*2.5;
  P.sigP=Math.random()*0.008;
  P.sigF=0.01+Math.random()*0.4;
}

initFlock();
loop();
</script>
</html>
